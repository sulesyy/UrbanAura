<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifremi Unuttum - UrbanAura</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

<header class="auth-brand">
    <a class="logo" href="/" aria-label="UrbanAura ana sayfa">
        <img src="/images/urbanaura-logo.png" alt="UrbanAura">
    </a>
</header>

<main class="auth-stage">
    <section class="auth-card auth-card-login">
        <a class="auth-close" href="/login" aria-label="Şifre sıfırlamayı kapat">&times;</a>

        <nav class="auth-tabs" aria-label="Hesap seçeneği">
            <a href="/login">Giriş Yap</a>
            <a href="/register">Kayıt Ol</a>
        </nav>

        <div class="auth-card-header">
            <span>URBANAURA</span>
            <h1>Şifreni yenile</h1>
            <p>Kayıtlı e-postanı yaz ve hesabın için yeni bir şifre belirle.</p>
        </div>

        <p class="auth-alert error" th:if="${error}" th:text="${error}">Şifre hatası</p>

        <form class="auth-form" action="/forgot-password" method="post">
            <label for="email">E-posta</label>
            <input id="email" name="email" type="email" placeholder="ornek@mail.com" th:value="${email}" autocomplete="email" required>

            <label for="password">Yeni Şifre</label>
            <input id="password" name="password" type="password" placeholder="En az 6 karakter" autocomplete="new-password" minlength="6" required>

            <label for="confirmPassword">Yeni Şifre Tekrar</label>
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Şifreni tekrar gir" autocomplete="new-password" minlength="6" required>

            <button class="auth-submit" type="submit">Şifreyi Güncelle</button>
        </form>

        <p class="auth-helper-text">
            Şifreni hatırladıysan <a href="/login">giriş ekranına dön</a>.
        </p>
    </section>
</main>

</body>
</html>
